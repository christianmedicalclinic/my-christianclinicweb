<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Book Appointment</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: Arial, sans-serif;
}

body{

}

header{

justify-content:space-between;
align-items:center;
padding:15px 60px;
flex-wrap: wrap;
}

font-size:2rem;
margin-bottom:10px;
}

nav{
display:flex;
gap:15px;
flex-wrap: wrap;
}

nav li{
list-style:none;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
font-size:1rem;
}

.container{
display:flex;
justify-content:space-between;
padding:70px 100px;
flex-wrap: wrap;
gap:20px;
}

.left{
flex:1 1 300px;
max-width:500px;
}

.left h2{
font-size:2.5rem;
color:#0a8f08;
margin-bottom:20px;
}

.info{
margin-top:30px;
}

.info p{
margin-bottom:20px;
}

.right{
flex:1 1 300px;
max-width:500px;
background:#eeeeee;
padding:30px;
border-radius:12px;
}

input, select{
width:100%;
padding:14px;
margin-bottom:15px;
border-radius:8px;
border:1px solid #ccc;

}

button{
background:#0a8f08;
color:white;
border:none;
padding:15px;
width:80%;
max-width:200px;

cursor:pointer;

margin:20px auto;
}

button:hover{
background:#066606;
}

.message{
margin-top:10px;
font-weight:bold;
text-align:center;
}

.slot-info{
font-size:0.9rem;
font-weight:bold;
margin-top:-10px;
margin-bottom:15px;
padding:10px 14px;
border-radius:8px;
}

.slot-info.available{
background:#e8f5e9;
color:#2e7d32;
border:1px solid #a5d6a7;
}

.slot-info.full{
background:#fdecea;
color:#c0392b;
border:1px solid #ef9a9a;
}

.slot-info.loading{
background:#f5f5f5;
color:#888;
border:1px solid #ddd;
}

.slot-info.past{
background:#fff3e0;
color:#e65100;
border:1px solid #ffcc80;
}

@media (max-width:900px){
.container{
flex-direction: column;
align-items: center;
padding:40px 20px;
}

.left, .right{
width:90%;
}

header{
padding:15px 20px;
flex-direction: column;
align-items:flex-start;
}

button{

}
}
</style>
</head>

<body>

<header>
<h1>Christian Medical Clinic</h1>

<nav>
<li><a href="index.html">Home</a></li>
<li><a href="services.html">Services</a></li>
<li><a href="contact.html">Contact</a></li>
<li><a href="booking.html">Book Appointment</a></li>
</nav>
</header>

<section class="container">

<div class="left">
<h2>Book Appointment</h2>
<p>Schedule your visit with our medical professionals.</p>

<div class="info">
<p>📞 901-5090/759-7116</p>
<p>📧 christianmed.inc23@yahoo.com</p>
<p>📍 22-B Madison Street, New Manila Quezon City</p>
</div>
</div>

<div class="right">
<form id="bookingForm">

<input type="text" name="fullname" placeholder="Full Name" required>
<input type="email" name="email" placeholder="Email" required>
<input type="text" name="phone" placeholder="Phone Number" required>

<select name="service" required>
<option value="">Select Service</option>
<option value="Annual Physical Exam (APE)">APE</option>
<option value="Outpatient Services">Outpatient Services</option>
<option value="Consultation">Consultation</option>
<option value="Dental">Dental</option>
<option value="Laboratory">Laboratory</option>
<option value="X-RAY">X-RAY</option>
<option value="Vaccination">Vaccination</option>
<option value="Optical">Optical</option>
</select>

<input type="date" id="date" name="date" required>

<select id="time" name="time" required>
<option value="">Select Time</option>
<option value="08:00">8:00 AM</option>
<option value="09:00">9:00 AM</option>
<option value="10:00">10:00 AM</option>
<option value="11:00">11:00 AM</option>
<option value="13:00">1:00 PM</option>
<option value="14:00">2:00 PM</option>
<option value="15:00">3:00 PM</option>
<option value="16:00">4:00 PM</option>
</select>

<!-- SLOT COUNT DISPLAY -->
<div id="slot-info" class="slot-info" style="display:none;"></div>

<button type="submit" id="submitBtn">Book Appointment</button>
<div class="message" id="message"></div>

</form>
</div>

</section>

<script>
const form = document.getElementById('bookingForm');
const messageDiv = document.getElementById('message');
const dateInput = document.getElementById('date');
const timeInput = document.getElementById('time');
const slotInfo = document.getElementById('slot-info');
const submitBtn = document.getElementById('submitBtn');

// ------------------------
// SET MIN DATE TO TODAY (Manila time)
// Blocks selecting past dates on the date picker
// ------------------------
function getTodayManila() {
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Manila' });
}

dateInput.min = getTodayManila();

// ------------------------
// CHECK IF SELECTED DATE+TIME IS IN THE PAST (Manila time)
// ------------------------
function isTimePast(date, time) {
  if (!date || !time) return false;

  // Get current Manila date and time
  const nowManila = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Manila' }));

  // Build the selected datetime in Manila time
  const [hour, minute] = time.split(':');
  const [year, month, day] = date.split('-');
  const selectedDateTime = new Date(year, month - 1, day, parseInt(hour), parseInt(minute), 0);

  return selectedDateTime <= nowManila;
}

// ------------------------
// FILTER OUT PAST TIME SLOTS WHEN TODAY IS SELECTED
// ------------------------
function updateTimeOptions() {
  const selectedDate = dateInput.value;
  const todayManila = getTodayManila();
  const allOptions = timeInput.querySelectorAll('option');

  allOptions.forEach(option => {
    if (!option.value) return; // skip the placeholder
    if (selectedDate === todayManila) {
      // Hide/disable times that have already passed
      if (isTimePast(selectedDate, option.value)) {
        option.disabled = true;
        option.style.color = '#bbb';
      } else {
        option.disabled = false;
        option.style.color = '';
      }
    } else {
      // Future date — enable all times
      option.disabled = false;
      option.style.color = '';
    }
  });

  // If currently selected time is now disabled, reset it
  if (timeInput.value && timeInput.options[timeInput.selectedIndex].disabled) {
    timeInput.value = '';
    slotInfo.style.display = 'none';
    submitBtn.disabled = false;
  }
}

// ------------------------
// CHECK SLOT AVAILABILITY
// ------------------------
async function checkSlot() {
  const date = dateInput.value;
  const time = timeInput.value;

  if (!date || !time) {
    slotInfo.style.display = 'none';
    return;
  }

  // Block past date+time combinations
  if (isTimePast(date, time)) {
    slotInfo.style.display = 'block';
    slotInfo.className = 'slot-info past';
    slotInfo.textContent = '⛔ This time slot has already passed. Please select a future time.';
    submitBtn.disabled = true;
    return;
  }

  slotInfo.style.display = 'block';
  slotInfo.className = 'slot-info loading';
  slotInfo.textContent = 'Checking availability...';
  submitBtn.disabled = true;

  try {
    const res = await fetch(`/slot-count?date=${date}&time=${time}`);
    const data = await res.json();

    if (data.remaining <= 0) {
      slotInfo.className = 'slot-info full';
      slotInfo.textContent = `⛔ This slot is fully booked (${data.booked}/${data.max} slots taken).`;
      submitBtn.disabled = true;
    } else {
      slotInfo.className = 'slot-info available';
      slotInfo.textContent = `✅ ${data.booked} out of ${data.max} slots taken — ${data.remaining} slot(s) still available.`;
      submitBtn.disabled = false;
    }

  } catch (err) {
    slotInfo.style.display = 'none';
    submitBtn.disabled = false;
    console.error('Slot check error:', err);
  }
}

dateInput.addEventListener('change', () => {
  updateTimeOptions();
  checkSlot();
});

timeInput.addEventListener('change', checkSlot);

// Run on load to disable past times if today is already selected
updateTimeOptions();

// ------------------------
// SUBMIT BOOKING
// ------------------------
form.addEventListener('submit', async function(e) {

  e.preventDefault();

  const date = dateInput.value;
  const time = timeInput.value;

  // Double-check on submit in case they bypassed the UI
  if (isTimePast(date, time)) {
    messageDiv.style.color = 'red';
    messageDiv.textContent = '⛔ This time slot has already passed. Please select a future time.';
    return;
  }

  messageDiv.style.color = "black";
  messageDiv.textContent = "Booking appointment...";

  const formData = new FormData(form);

  const data = {
    fullname: formData.get('fullname'),
    email: formData.get('email'),
    phone: formData.get('phone'),
    service: formData.get('service'),
    date: formData.get('date'),
    time: formData.get('time')
  };

  console.log("Sending:", data);

  try {

    const response = await fetch('/book-appointment', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json'
      },
      body: JSON.stringify(data)
    });

    const result = await response.json();

    console.log("SERVER RESPONSE:", result);

    messageDiv.textContent = result.message;

    if (response.ok) {

      messageDiv.style.color = "green";

      form.reset();
      slotInfo.style.display = 'none';
      submitBtn.disabled = false;
      dateInput.min = getTodayManila();
      updateTimeOptions();

    } else {

      messageDiv.style.color = "red";

    }

  } catch (error) {

    console.log("FETCH ERROR:", error);

    messageDiv.style.color = "red";

    messageDiv.textContent = "Cannot connect to server";

  }

});
</script>

</body>
</html>
