<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    background: #f4fefe;
    font-family: "Segoe UI", Tahoma, sans-serif;
    margin: 0;
    padding: 0;
}

header {
    background: #00861d;
    color: #fff;
    padding: 20px 0;
}

header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

header a {
    color: #fff;
    text-decoration: none;
}

section.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

h3 {
    color: #117b0b;
    margin-bottom: 20px;
}

.date-section {
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.date-header {
    background: #0a8f08;
    color: white;
    padding: 10px 15px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    border-radius: 8px 8px 0 0;
}

.date-content {
    padding: 10px 15px;
}

.msg-box {
    background: #fff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.08);
}

.delete-btn {
    margin-top: 5px;
    background: #dc3545;
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #b52a37;
}

.date-counter {
    font-weight: bold;
}

/* SEARCH BAR */
.search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
    margin-bottom: 20px;
    flex-wrap: wrap;
}

.search-bar input[type="date"] {
    padding: 10px;
    border: 1px solid #ccc;
    border-radius: 8px;
    font-size: 1rem;
}

.search-bar button {
    padding: 10px 20px;
    background: #0a8f08;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 1rem;
    cursor: pointer;
}

.search-bar button:hover {
    background: #066606;
}

.search-bar .clear-btn {
    background: #6c757d;
}

.search-bar .clear-btn:hover {
    background: #545b62;
}

/* SERVICE FOLDER */
.service-folder {
    margin-bottom: 15px;
    border: 1px solid #ddd;
    border-radius: 6px;
    background: #f9f9f9;
}

.service-header {
    background: #117b0b;
    color: white;
    padding: 8px 12px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    border-radius: 6px 6px 0 0;
}

.service-header:hover {
    background: #0e6a09;
}

.service-content {
    padding: 10px;
}

/* TIME FOLDER */
.time-folder {
    margin-bottom: 10px;
    border: 1px solid #e0e0e0;
    border-radius: 5px;
    background: #fff;
}

.time-header {
    background: #28a745;
    color: white;
    padding: 6px 10px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    border-radius: 5px 5px 0 0;
    font-size: 0.95rem;
}

.time-header:hover {
    background: #218838;
}

.time-content {
    padding: 8px;
}

.folder-icon {
    margin-right: 8px;
}
</style>
</head>

<body>

<header>
<div class="container">
<h2>Admin Dashboard</h2>
<a href="index.html">Logout</a>
</div>
</header>

<section class="container">

<h3>Patient Messages</h3>
<div id="messages"></div>

<h3>Booked Appointments</h3>

<!-- SEARCH BAR -->
<div class="search-bar">
    <input type="date" id="searchDate">
    <button onclick="searchDate()">🔍 Find</button>
    <button class="clear-btn" onclick="clearSearch()">✖ Clear</button>
</div>

<div id="appointments"></div>

</section>

<script>

/* =========================
   CONTACT MESSAGES
========================= */

let messages = JSON.parse(localStorage.getItem("messages")) || [];
let messagesContainer = document.getElementById("messages");

if (messages.length === 0) {
    messagesContainer.innerHTML = "<p>No messages yet.</p>";
} else {
    messages.forEach((msg, index) => {
        messagesContainer.innerHTML += `
            <div class="msg-box">
                <p><strong>Name:</strong> ${msg.name}</p>
                <p><strong>Email:</strong> ${msg.email}</p>
                <p>${msg.message}</p>
                <button class="delete-btn" onclick="deleteMessage(${index})">Delete</button>
            </div>
        `;
    });
}

function deleteMessage(index) {
    let messages = JSON.parse(localStorage.getItem("messages")) || [];
    if (confirm("Delete this message?")) {
        messages.splice(index, 1);
        localStorage.setItem("messages", JSON.stringify(messages));
        location.reload();
    }
}


/* =========================
   APPOINTMENTS
========================= */

let allAppointments = [];

function formatDate(rawDate) {
    const d = new Date(rawDate);
    return d.toLocaleDateString('en-PH', {
        year: 'numeric',
        month: 'long',
        day: 'numeric',
        timeZone: 'Asia/Manila'
    });
}

function formatTime(rawTime) {
    const [hour, minute] = rawTime.split(':');
    const h = parseInt(hour);
    const ampm = h >= 12 ? 'PM' : 'AM';
    const h12 = h % 12 || 12;
    return `${h12}:${minute} ${ampm}`;
}

function searchDate() {
    const selected = document.getElementById("searchDate").value;
    if (!selected) {
        alert("Please pick a date first.");
        return;
    }
    renderAppointments(allAppointments, selected);
}

function clearSearch() {
    document.getElementById("searchDate").value = "";
    renderAppointments(allAppointments, null);
}

function renderAppointments(appointments, filterDate) {

    let container = document.getElementById("appointments");

    if (appointments.length === 0) {
        container.innerHTML = "<p>No appointments yet.</p>";
        return;
    }

    container.innerHTML = "";

    let groupedByDate = {};

    appointments.forEach(app => {
        const date = app.appointment_date;
        if (!groupedByDate[date]) groupedByDate[date] = [];
        groupedByDate[date].push(app);
    });

    let dates = Object.keys(groupedByDate).sort();

    // FILTER IF DATE SELECTED
    if (filterDate) {
        dates = dates.filter(date => {
            const d = new Date(date);
            const local = d.toLocaleDateString('en-CA', { timeZone: 'Asia/Manila' });
            return local === filterDate;
        });

        if (dates.length === 0) {
            container.innerHTML = "<p>No appointments found for this date.</p>";
            return;
        }
    }

    dates.forEach(date => {

        let section = document.createElement("div");
        section.className = "date-section";

        let header = document.createElement("div");
        header.className = "date-header";
        header.innerHTML = `
            <span>📅 Date: ${formatDate(date)}</span>
            <span class="date-counter">${groupedByDate[date].length} / 100</span>
        `;

        section.appendChild(header);

        // DELETE ALL BUTTON
        let deleteAllBtn = document.createElement("button");
        deleteAllBtn.className = "delete-btn";
        deleteAllBtn.textContent = "Delete All";
        deleteAllBtn.onclick = async function(e) {
            e.stopPropagation();
            if (confirm("Delete all appointments for this date?")) {
                try {
                    for (const app of groupedByDate[date]) {
                        await fetch(`/delete-appointment/${app.id}`, { method: 'DELETE' });
                    }
                    loadAppointments();
                } catch (error) {
                    console.log(error);
                }
            }
        };
        header.appendChild(deleteAllBtn);

        let content = document.createElement("div");
        content.className = "date-content";

        // GROUP BY SERVICE FIRST
        let groupedByService = {};
        groupedByDate[date].forEach(app => {
            const serviceName = app.service || "Unknown Service";
            if (!groupedByService[serviceName]) groupedByService[serviceName] = [];
            groupedByService[serviceName].push(app);
        });

        // LOOP THROUGH SERVICES
        Object.keys(groupedByService).sort().forEach(service => {

            let serviceFolder = document.createElement("div");
            serviceFolder.className = "service-folder";

            let serviceHeader = document.createElement("div");
            serviceHeader.className = "service-header";
            serviceHeader.innerHTML = `
                <span><span class="folder-icon">📁</span>${service}</span>
                <span>${groupedByService[service].length} appointment(s)</span>
            `;
            serviceFolder.appendChild(serviceHeader);

            let serviceContent = document.createElement("div");
            serviceContent.className = "service-content";

            // GROUP BY TIME WITHIN SERVICE
            let groupedByTime = {};
            groupedByService[service].forEach(app => {
                if (!groupedByTime[app.time]) groupedByTime[app.time] = [];
                groupedByTime[app.time].push(app);
            });

            // LOOP THROUGH TIME SLOTS
            Object.keys(groupedByTime).sort().forEach(time => {

                let timeFolder = document.createElement("div");
                timeFolder.className = "time-folder";

                let timeHeader = document.createElement("div");
                timeHeader.className = "time-header";
                timeHeader.innerHTML = `
                    <span><span class="folder-icon">🕐</span>${formatTime(time)}</span>
                    <span>${groupedByTime[time].length} / 12 booked</span>
                `;
                timeFolder.appendChild(timeHeader);

                let timeContent = document.createElement("div");
                timeContent.className = "time-content";

                // INDIVIDUAL APPOINTMENTS
                groupedByTime[time].forEach(app => {
                    let div = document.createElement("div");
                    div.className = "msg-box";
                    div.innerHTML = `
                        <p><strong>Name:</strong> ${app.fullname}</p>
                        <p><strong>Email:</strong> ${app.email}</p>
                        <p><strong>Phone:</strong> ${app.phone}</p>
                        <button class="delete-btn" onclick="deleteAppointment(${app.id})">Delete</button>
                    `;
                    timeContent.appendChild(div);
                });

                timeFolder.appendChild(timeContent);
                serviceContent.appendChild(timeFolder);

                // TOGGLE TIME FOLDER
                timeHeader.addEventListener("click", (e) => {
                    e.stopPropagation();
                    timeContent.style.display = timeContent.style.display === "none" ? "block" : "none";
                });

            });

            serviceFolder.appendChild(serviceContent);
            content.appendChild(serviceFolder);

            // TOGGLE SERVICE FOLDER
            serviceHeader.addEventListener("click", (e) => {
                e.stopPropagation();
                serviceContent.style.display = serviceContent.style.display === "none" ? "block" : "none";
            });

        });

        section.appendChild(content);
        container.appendChild(section);

        header.addEventListener("click", () => {
            content.style.display = content.style.display === "none" ? "block" : "none";
        });

    });

}

async function loadAppointments() {
    let container = document.getElementById("appointments");
    try {
        const response = await fetch('/appointments');
        allAppointments = await response.json();
        const filterDate = document.getElementById("searchDate").value || null;
        renderAppointments(allAppointments, filterDate);
    } catch (error) {
        console.log("FETCH ERROR:", error);
        container.innerHTML = "<p>Failed to load appointments.</p>";
    }
}

async function deleteAppointment(id) {
    if (confirm("Delete this appointment?")) {
        try {
            const response = await fetch(`/delete-appointment/${id}`, { method: 'DELETE' });
            const result = await response.json();
            alert(result.message);
            loadAppointments();
        } catch(error) {
            console.log(error);
        }
    }
}

loadAppointments();

</script>

</body>
</html>
