<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard</title>

<style>
body {
    background: #f4fefe;
    font-family: "Segoe UI", Tahoma, sans-serif;
    margin: 0;
    padding: 0;
}

header {
    background: #00861d;
    color: #fff;
    padding: 20px 0;
}

header .container {
    display: flex;
    justify-content: space-between;
    align-items: center;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
}

header a {
    color: #fff;
    text-decoration: none;
}

section.container {
    max-width: 900px;
    margin: 40px auto;
    padding: 0 20px;
}

h3 {
    color: #117b0b;
    margin-bottom: 20px;
}

.date-section {
    margin-bottom: 20px;
    border: 1px solid #ccc;
    border-radius: 8px;
}

.date-header {
    background: #0a8f08;
    color: white;
    padding: 10px 15px;
    cursor: pointer;
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-weight: bold;
    border-radius: 8px 8px 0 0;
}

.date-content {
    padding: 10px 15px;
}

.msg-box {
    background: #fff;
    padding: 10px;
    margin-bottom: 10px;
    border-radius: 8px;
    box-shadow: 0 3px 6px rgba(0,0,0,0.08);
}

.delete-btn {
    margin-top: 5px;
    background: #dc3545;
    color: #fff;
    border: none;
    padding: 5px 10px;
    border-radius: 5px;
    cursor: pointer;
}

.delete-btn:hover {
    background: #b52a37;
}

.date-counter {
    font-weight: bold;
}
</style>
</head>

<body>

<header>
<div class="container">
<h2>Admin Dashboard</h2>
<a href="index.html">Logout</a>
</div>
</header>

<section class="container">

<h3>Patient Messages</h3>
<div id="messages"></div>

<h3>Booked Appointments</h3>
<div id="appointments"></div>

</section>

<script>

/* =========================
   CONTACT MESSAGES
========================= */

let messages = JSON.parse(localStorage.getItem("messages")) || [];
let messagesContainer = document.getElementById("messages");

if (messages.length === 0) {
    messagesContainer.innerHTML = "<p>No messages yet.</p>";
} else {

    messages.forEach((msg, index) => {

        messagesContainer.innerHTML += `

            <div class="msg-box">

                <p><strong>Name:</strong> ${msg.name}</p>

                <p><strong>Email:</strong> ${msg.email}</p>

                <p>${msg.message}</p>

                <button class="delete-btn"
                    onclick="deleteMessage(${index})">
                    Delete
                </button>

            </div>

        `;

    });

}

function deleteMessage(index) {

    let messages =
        JSON.parse(localStorage.getItem("messages")) || [];

    if (confirm("Delete this message?")) {

        messages.splice(index, 1);

        localStorage.setItem(
            "messages",
            JSON.stringify(messages)
        );

        location.reload();

    }

}


/* =========================
   APPOINTMENTS (SUPABASE DATABASE)
========================= */

async function loadAppointments() {

    let container = document.getElementById("appointments");

    try {

        const response = await fetch('/appointments');

        const appointments = await response.json();

        console.log("APPOINTMENTS:", appointments);

        if (appointments.length === 0) {

            container.innerHTML =
                "<p>No appointments yet.</p>";

            return;
        }

        container.innerHTML = "";

        let groupedByDate = {};

        appointments.forEach(app => {

            const date = app.appointment_date;

            if (!groupedByDate[date]) {

                groupedByDate[date] = [];

            }

            groupedByDate[date].push(app);

        });

        Object.keys(groupedByDate)
        .sort()
        .forEach(date => {

            let section =
                document.createElement("div");

            section.className = "date-section";

            let header =
                document.createElement("div");

            header.className = "date-header";

            header.innerHTML = `

                <span>Date: ${date}</span>

                <span class="date-counter">

                    ${groupedByDate[date].length} / 100

                </span>

            `;

            section.appendChild(header);

            // DELETE ALL BUTTON
            let deleteAllBtn =
                document.createElement("button");

            deleteAllBtn.className = "delete-btn";

            deleteAllBtn.textContent = "Delete All";

            deleteAllBtn.onclick = async function(e){

                e.stopPropagation();

                if(confirm(
                    "Delete all appointments for this date?"
                )){

                    try {

                        for (const app of groupedByDate[date]) {

                            await fetch(
                                `/delete-appointment/${app.id}`,
                                {
                                    method: 'DELETE'
                                }
                            );

                        }

                        loadAppointments();

                    } catch (error) {

                        console.log(error);

                    }

                }

            };

            header.appendChild(deleteAllBtn);

            let content =
                document.createElement("div");

            content.className = "date-content";

            let groupedByTime = {};

            groupedByDate[date].forEach(app => {

                if (!groupedByTime[app.time]) {

                    groupedByTime[app.time] = [];

                }

                groupedByTime[app.time].push(app);

            });

            Object.keys(groupedByTime)
            .sort()
            .forEach(time => {

                let timeHeader =
                    document.createElement("div");

                timeHeader.style.fontWeight = "bold";

                timeHeader.style.marginBottom = "10px";

                timeHeader.textContent =

                    `${time} → ${groupedByTime[time].length} / 12 booked`;

                content.appendChild(timeHeader);

                groupedByTime[time].forEach(app => {

                    let div =
                        document.createElement("div");

                    div.className = "msg-box";

                    div.innerHTML = `

                        <p><strong>Name:</strong>
                            ${app.fullname}
                        </p>

                        <p><strong>Email:</strong>
                            ${app.email}
                        </p>

                        <p><strong>Phone:</strong>
                            ${app.phone}
                        </p>

                        <p><strong>Service:</strong>
                            ${app.service}
                        </p>

                        <button class="delete-btn"
                            onclick="deleteAppointment(${app.id})">
                            Delete
                        </button>

                    `;

                    content.appendChild(div);

                });

            });

            section.appendChild(content);

            container.appendChild(section);

            header.addEventListener("click", () => {

                content.style.display =

                    content.style.display === "none"

                    ? "block"

                    : "none";

            });

        });

    } catch (error) {

        console.log("FETCH ERROR:", error);

        container.innerHTML =

            "<p>Failed to load appointments.</p>";

    }

}


// DELETE ONE
async function deleteAppointment(id){

    if(confirm("Delete this appointment?")){

        try {

            const response = await fetch(

                `/delete-appointment/${id}`,

                {
                    method: 'DELETE'
                }

            );

            const result = await response.json();

            alert(result.message);

            loadAppointments();

        } catch(error){

            console.log(error);

        }

    }

}


// LOAD APPOINTMENTS
loadAppointments();

</script>

</body>
</html>
